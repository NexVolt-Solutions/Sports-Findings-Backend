version: "3.9"

# Development Docker Compose - Enhanced with hot-reload and debugging

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sports-platform-api-dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/sports_platform
      REDIS_URL: redis://default:redis_password@redis:6379/0
      DEBUG: "True"
      ENVIRONMENT: "development"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Mount app for hot-reload in development
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.pytest_cache
    # Use python -m uvicorn for development with auto-reload
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - sports-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

  db:
    image: postgres:15-alpine
    container_name: sports-platform-db-dev
    environment:
      POSTGRES_DB: sports_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sports_platform"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - sports-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

  redis:
    image: redis:7-alpine
    container_name: sports-platform-redis-dev
    command: redis-server --appendonly yes
    volumes:
      - redis_data_dev:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - sports-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

  # Optional: Adminer for Database UI (development only)
  adminer:
    image: adminer:latest
    container_name: sports-platform-adminer-dev
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - sports-network
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local

networks:
  sports-network:
    driver: bridge
