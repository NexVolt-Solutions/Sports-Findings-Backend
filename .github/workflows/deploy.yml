name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM and wait
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-049c28cba2c29e5df" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "cd /home/ubuntu/Sports-Findings-Backend",

              "echo \"Resetting repo to latest origin/main...\"",
              "git fetch origin main",
              "git reset --hard origin/main",
              "git clean -fd",
              "CURRENT_COMMIT=$(git rev-parse HEAD)",
              "echo \"Current commit: $CURRENT_COMMIT\"",

              "docker-compose -f docker-compose.prod.yml down",
              "docker-compose -f docker-compose.prod.yml up -d --build --no-cache",

              "sleep 5",
              "RUNNING_IMAGE=$(docker inspect --format=\"{{.Image}}\" sport-finding-api 2>/dev/null || echo \"Not running\")",
              "echo \"Running container image: $RUNNING_IMAGE\"",

              "docker-compose -f docker-compose.prod.yml logs api | head -20",
              "docker-compose -f docker-compose.prod.yml exec -T api alembic upgrade head",

              "sleep 3",
              "curl -f http://localhost:8000/health || echo \"Health check failed\"",

              "echo \"Deploy completed successfully at $(date)\"",
              "echo \"Deployed commit: $CURRENT_COMMIT\""
            ]' \
            --region ap-southeast-2 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"
          echo "Waiting for deployment to complete..."

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "i-049c28cba2c29e5df" \
            --region ap-southeast-2

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-049c28cba2c29e5df" \
            --region ap-southeast-2 \
            --query "Status" \
            --output text)

          echo "Deployment status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed! Full logs:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-049c28cba2c29e5df" \
              --region ap-southeast-2 \
              --query "StandardOutputContent" \
              --output text

            echo ""
            echo "Error logs:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-049c28cba2c29e5df" \
              --region ap-southeast-2 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi

          echo ""
          echo "=========================================="
          echo " Deployment completed successfully!"
          echo "=========================================="

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-049c28cba2c29e5df" \
            --region ap-southeast-2 \
            --query "StandardOutputContent" \
            --output text | tail -20