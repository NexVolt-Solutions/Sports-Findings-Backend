name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM and wait
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-049c28cba2c29e5df" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["set -e; set -x; cd /home/ubuntu/Sports-Findings-Backend && git fetch origin main && git reset --hard origin/main && git clean -fd && docker-compose -f docker-compose.prod.yml down && docker-compose -f docker-compose.prod.yml up -d --build && sleep 30 && docker-compose -f docker-compose.prod.yml exec -T api alembic upgrade head && echo Deploy completed successfully"]' \
            --region ap-southeast-2 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"
          echo "Waiting for deployment to complete..."

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "i-049c28cba2c29e5df" \
            --region ap-southeast-2

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-049c28cba2c29e5df" \
            --region ap-southeast-2 \
            --query "Status" \
            --output text)

          echo "Deployment status: $STATUS"

          echo "=== STDOUT ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-049c28cba2c29e5df" \
            --region ap-southeast-2 \
            --query "StandardOutputContent" \
            --output text

          echo "=== STDERR ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-049c28cba2c29e5df" \
            --region ap-southeast-2 \
            --query "StandardErrorContent" \
            --output text

          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed!"
            exit 1
          fi

          echo "Deployment completed successfully!"
          
