# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow ACME challenges for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL Configuration
    ssl_certificate     /etc/ssl/certs/your_cert.pem;
    ssl_certificate_key /etc/ssl/private/your_key.pem;

    # SSL Security Best Practices
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml 
               text/x-js text/x-component text/x-cross-domain-policy;
    gzip_disable "msie6";

    # Logging
    access_log /var/log/nginx/sports-platform-access.log combined;
    error_log  /var/log/nginx/sports-platform-error.log warn;

    # Client max body size (file uploads)
    client_max_body_size 50M;

    # Upstream API Server
    upstream api_backend {
        least_conn;  # Use least connections load balancing
        server api:8000 max_fails=3 fail_timeout=30s;
        # Add more servers for horizontal scaling:
        # server api1:8000 max_fails=3 fail_timeout=30s;
        # server api2:8000 max_fails=3 fail_timeout=30s;
    }

    # ─── Regular HTTP API Requests ───────────────────────────────────────────
    location / {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Timeouts for regular requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Rate limiting for general API
        limit_req zone=api_limit burst=20 nodelay;
    }

    # ─── Authentication Endpoints (Stricter Rate Limiting) ──────────────────
    location ~ ^/api/v1/auth/(login|register|verify|refresh) {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting for auth endpoints (stricter)
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ─── WebSocket Connections ─────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-specific timeouts (longer for persistent connections)
        proxy_read_timeout 300s;    # 5 minutes
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;

        # Disable buffering for WebSocket
        proxy_buffering off;

        # Rate limiting for WebSocket (per connection, not per request)
        limit_req zone=api_limit burst=5 nodelay;
    }

    # ─── Health Check Endpoint (No Rate Limiting) ──────────────────────────
    location = /health {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        access_log off;  # Don't log health checks
    }

    # ─── API Documentation (No Rate Limiting) ──────────────────────────────
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cache API docs for 1 hour
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ─── Static Assets Caching (if serving from API) ────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;

        # Cache static assets for 30 days
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Deny Access to Sensitive Files ────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

