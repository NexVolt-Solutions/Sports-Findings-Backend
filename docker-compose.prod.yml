version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from: []
    image: sport-finding-api:latest
    container_name: sport-finding-api
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
